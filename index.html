<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>beta</title>
    <h1 style="text-align: center;">hello there if you are here that means that you have clicked on the link</h1>
</head>
<body>
<h4>name</h4><input type="text" id="name" placeholder="enter your name to proceed">
<button id="next" disabled onclick="document.location='thanks.html'">next</button>
</body>
</html>
<script>
const inputField = document.getElementById('name');
const actionButton = document.getElementById('next');
inputField.addEventListener('keyup', function() {
  if (inputField.value.trim() !== '') {
    actionButton.disabled = false;
  } else {
    actionButton.disabled = true;
  }
});

</script>
